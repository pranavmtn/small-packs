{% extends "base.html" %}
{% block title %}Login · {{ app_name }}{% endblock %}
{% block body_class %}auth-page{% endblock %}
{% block main_class %}container auth-wrap{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-brand">
    <p class="auth-eyebrow">Household inventory</p>
    <h1>{{ app_name }}</h1>
    <p class="auth-sub">Sign in to manage your packs.</p>
  </div>

  <form method="post" class="auth-form" autocomplete="on">
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus autocomplete="username">
    </div>
    <div class="mb-4">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control form-control-lg" id="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-accent btn-lg w-100">Log in</button>
  </form>
</div>
{% endblock %}
